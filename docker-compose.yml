version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma-db
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      chromadb:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    restart: always

  rag-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-dashboard-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      chromadb:
        condition: service_healthy
    command: streamlit run src/dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    restart: always

volumes:
  chroma-data:
    driver: local
