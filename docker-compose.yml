version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma-db
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data
    restart: always

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - chromadb
    command: bash -c "python -m src.ingestion.seed && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    restart: always

  rag-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-dashboard-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - chromadb
    command: python3 -m http.server 8501 --directory /app/frontend/dist
    restart: always

volumes:
  chroma-data:
    driver: local
